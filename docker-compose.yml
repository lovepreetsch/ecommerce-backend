version: '3.8'

services:
  # ========================
  # INFRASTRUCTURE
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ========================
  # PLATFORM SERVICES
  # ========================
  discovery-server:
    build: ./discovery-server
    container_name: ecommerce-discovery
    environment:
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  config-server:
    build: ./config-server
    container_name: ecommerce-config
    environment:
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: ecommerce-gateway
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ========================
  # BUSINESS SERVICES
  # ========================
  auth-service:
    build: ./auth-service
    container_name: ecommerce-auth
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  user-service:
    build: ./user-service
    container_name: ecommerce-user
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  product-service:
    build: ./product-service
    container_name: ecommerce-product
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  cart-service:
    build: ./cart-service
    container_name: ecommerce-cart
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  order-service:
    build: ./order-service
    container_name: ecommerce-order
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  payment-service:
    build: ./payment-service
    container_name: ecommerce-payment
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    ports:
      - "8086:8086"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  inventory-service:
    build: ./inventory-service
    container_name: ecommerce-inventory
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
    ports:
      - "8087:8087"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

  notification-service:
    build: ./notification-service
    container_name: ecommerce-notification
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_HOST=discovery-server
      - EUREKA_USERNAME=eureka
      - EUREKA_PASSWORD=eureka123
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-your-email@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-your-app-password}
    ports:
      - "8088:8088"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ecommerce-network:
    driver: bridge
