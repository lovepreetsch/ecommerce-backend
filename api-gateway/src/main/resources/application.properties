# ===== Server =====
server.port=9090

# ===== Spring =====
spring.application.name=api-gateway
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}

# ===== Gateway Discovery =====
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===== Default Rate Limiter Filter =====
spring.cloud.gateway.default-filters[0].name=RequestRateLimiter
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.default-filters[0].args.key-resolver=#{@ipKeyResolver}

# ===== Route: Auth Service =====
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=authServiceCB
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# ===== Route: User Service =====
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=userServiceCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/user

# ===== Route: Product Service =====
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://product-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=productServiceCB
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/product

# ===== Route: Cart Service =====
spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=lb://cart-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=cartServiceCB
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/cart

# ===== Route: Order Service =====
spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=orderServiceCB
spring.cloud.gateway.routes[4].filters[0].args.fallbackUri=forward:/fallback/order

# ===== Route: Payment Service =====
spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[5].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[0].args.name=paymentServiceCB
spring.cloud.gateway.routes[5].filters[0].args.fallbackUri=forward:/fallback/payment

# ===== Route: Inventory Service =====
spring.cloud.gateway.routes[6].id=inventory-service
spring.cloud.gateway.routes[6].uri=lb://inventory-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[6].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[6].filters[0].args.name=inventoryServiceCB
spring.cloud.gateway.routes[6].filters[0].args.fallbackUri=forward:/fallback/inventory

# ===== Route: Notification Service =====
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[7].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[7].filters[0].args.name=notificationServiceCB
spring.cloud.gateway.routes[7].filters[0].args.fallbackUri=forward:/fallback/notification

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===== JWT =====
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbiBpbiBlY29tbWVyY2UgcGxhdGZvcm0=}

# ===== Eureka =====
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka123}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
eureka.instance.prefer-ip-address=true

# ===== Resilience4j =====
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.configs.default.timeout-duration=5s

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# ===== Logging =====
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.ecommerce.gateway=DEBUG
