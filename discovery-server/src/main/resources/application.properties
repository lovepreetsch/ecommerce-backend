# ===== Server =====
server.port=8761

# ===== Spring =====
spring.application.name=discovery-server
spring.security.user.name=${EUREKA_USERNAME:eureka}
spring.security.user.password=${EUREKA_PASSWORD:eureka123}

# ===== Eureka Server =====
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://${spring.security.user.name}:${spring.security.user.password}@localhost:${server.port}/eureka/

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== Logging =====
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
